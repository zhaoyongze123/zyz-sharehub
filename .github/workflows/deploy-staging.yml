name: 部署 Staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: 构建并部署到 staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 构建前端产物
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: 安装 rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: 配置 SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$STAGING_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.STAGING_PORT || 22 }}" -H "$STAGING_HOST" >> ~/.ssh/known_hosts

      - name: 同步仓库到 staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            --exclude 'backend/target' \
            --exclude '.playwright-cli' \
            --exclude 'test-results' \
            --exclude '.DS_Store' \
            -e "ssh -p ${STAGING_PORT:-22}" \
            ./ "${STAGING_USER}@${STAGING_HOST}:${STAGING_APP_DIR}/"

      - name: 同步前端 dist 到 staging
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          rsync -az --delete \
            -e "ssh -p ${STAGING_PORT:-22}" \
            frontend/dist/ "${STAGING_USER}@${STAGING_HOST}:${STAGING_APP_DIR}/frontend/dist/"

      - name: 写入 staging 环境变量
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          ssh -p "${STAGING_PORT:-22}" "${STAGING_USER}@${STAGING_HOST}" \
            "mkdir -p '${STAGING_APP_DIR}/deploy'"
          printf '%s\n' "${STAGING_ENV_FILE}" | \
            ssh -p "${STAGING_PORT:-22}" "${STAGING_USER}@${STAGING_HOST}" \
              "cat > '${STAGING_APP_DIR}/deploy/.env.staging'"

      - name: 执行远端 staging 部署
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_PORT: ${{ secrets.STAGING_PORT }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_APP_DIR: ${{ secrets.STAGING_APP_DIR }}
        run: |
          ssh -p "${STAGING_PORT:-22}" "${STAGING_USER}@${STAGING_HOST}" \
            "cd '${STAGING_APP_DIR}' && bash scripts/deploy-staging.sh"
