spring:
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: ${GITHUB_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope: read:user,user:email

sharehub:
  auth:
    github:
      enabled: true
