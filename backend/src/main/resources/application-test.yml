spring:
  datasource:
    url: jdbc:h2:mem:sharehub;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  data:
    redis:
      repositories:
        enabled: false

sharehub:
  auth:
    github:
      enabled: false
  storage:
    file:
      max-size: 5242880
