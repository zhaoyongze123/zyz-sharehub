spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:55432}/${POSTGRES_DB:sharehub_dev}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:sharehub_dev}
    password: ${POSTGRES_PASSWORD:sharehub_dev_local_pg}
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:56379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

sharehub:
  auth:
    github:
      enabled: false
  storage:
    file:
      max-size: 5242880
