server:
  address: 127.0.0.1
  port: 18080

spring:
  application:
    name: sharehub-backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:55432}/${POSTGRES_DB:sharehub_dev}
    username: ${POSTGRES_USER:sharehub_dev}
    password: ${POSTGRES_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:56379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

sharehub:
  auth:
    github:
      enabled: ${GITHUB_OAUTH_ENABLED:false}
  storage:
    spaces:
      endpoint: ${DO_SPACES_ENDPOINT:}
      region: ${DO_SPACES_REGION:}
      bucket: ${DO_SPACES_BUCKET:}
      access-key: ${DO_SPACES_ACCESS_KEY:}
      secret-key: ${DO_SPACES_SECRET_KEY:}
    file:
      max-size: 5242880
