services:
  postgres:
    image: postgres:16-alpine
    container_name: sharehub-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sharehub_dev}
      POSTGRES_USER: ${POSTGRES_USER:-sharehub_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_postgres_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharehub_dev} -d ${POSTGRES_DB:-sharehub_dev}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: sharehub-dev-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-replace_redis_password}
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-replace_redis_password}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
