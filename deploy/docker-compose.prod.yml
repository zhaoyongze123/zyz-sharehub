services:
  postgres:
    image: postgres:16-alpine
    container_name: sharehub-postgres
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_DB: ${POSTGRES_DB:-sharehub_prod}
      POSTGRES_USER: ${POSTGRES_USER:-sharehub_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharehub_prod} -d ${POSTGRES_DB:-sharehub_prod}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - prod_internal

  redis:
    image: redis:7.2-alpine
    container_name: sharehub-redis
    restart: unless-stopped
    env_file:
      - ./.env.prod
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-replace_redis_password}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-replace_redis_password}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - prod_internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: zyz-sharehub-backend:latest
    container_name: sharehub-backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_ENV: ${APP_ENV:-production}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production,oauth}
      GITHUB_OAUTH_ENABLED: ${GITHUB_OAUTH_ENABLED:-true}
      SHAREHUB_ADMIN_DEV_TOKEN_ENABLED: ${SHAREHUB_ADMIN_DEV_TOKEN_ENABLED:-false}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sharehub_prod}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sharehub_prod}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-replace_postgres_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-replace_redis_password}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - prod_internal

  nginx:
    image: nginx:1.27-alpine
    container_name: sharehub-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROD_NGINX_HOST_PORT:-19080}:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prod_internal

volumes:
  postgres_data:
  redis_data:

networks:
  prod_internal:
    name: sharehub-prod-internal
