services:
  postgres:
    image: postgres:16-alpine
    container_name: sharehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sharehub}
      POSTGRES_USER: ${POSTGRES_USER:-sharehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace_postgres_password}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prod_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharehub} -d ${POSTGRES_DB:-sharehub}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: sharehub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-replace_redis_password}"]
    volumes:
      - redis_data:/data
    networks:
      - prod_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-replace_redis_password}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: zyz-sharehub-backend:latest
    container_name: sharehub-backend
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      APP_ENV: ${APP_ENV:-production}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-production}
      GITHUB_OAUTH_ENABLED: ${GITHUB_OAUTH_ENABLED:-false}
      SHAREHUB_ADMIN_DEV_TOKEN_ENABLED: ${SHAREHUB_ADMIN_DEV_TOKEN_ENABLED:-false}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sharehub}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-sharehub}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-replace_postgres_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-replace_redis_password}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - prod_internal
      - public
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    container_name: sharehub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - public

  certbot:
    image: certbot/certbot:latest
    container_name: sharehub-certbot
    profiles: ["certbot"]
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    networks:
      - public

volumes:
  postgres_data:
  redis_data:

networks:
  public:
    name: sharehub-public
  prod_internal:
    name: sharehub-prod-internal
