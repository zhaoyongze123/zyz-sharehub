services:
  postgres:
    image: postgres:16-alpine
    container_name: sharehub-test-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB:-sharehub_test}
      POSTGRES_USER: ${POSTGRES_TEST_USER:-sharehub_test}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-replace_postgres_password}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "127.0.0.1:${POSTGRES_TEST_PORT:-55433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-sharehub_test} -d ${POSTGRES_TEST_DB:-sharehub_test}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: sharehub-test-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_TEST_PASSWORD:-replace_redis_password}
    ports:
      - "127.0.0.1:${REDIS_TEST_PORT:-56380}:6379"
    volumes:
      - redis_test_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_TEST_PASSWORD:-replace_redis_password}", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  postgres_test_data:
  redis_test_data:
