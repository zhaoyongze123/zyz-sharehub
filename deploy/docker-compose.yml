version: '3.9'
services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sharehub-backend
    env_file:
      - ../.env
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: sharehub-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
