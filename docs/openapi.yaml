        '404':
          description: 评论不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          description: 业务错误码，便于前端区分类型
        message:
          type: string
          description: 出错提示
    StoredFileUploadResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/StoredFileDto'
    ResourceAttachmentUploadResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            resourceId:
              type: integer
              format: int64
            file:
              $ref: '#/components/schemas/StoredFileDto'
    StoredFileDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner:
          type: string
        category:
          type: string
          enum:
            - AVATAR
            - RESOURCE_ATTACHMENT
            - RESUME_PDF
        referenceType:
          type: string
        referenceId:
          type: string
        filename:
          type: string
        contentType:
          type: string
          description: 入库时的 `contentType`；若上传时缺省或非法则回落到 `application/octet-stream`
        size:
          type: integer
          format: int64
        checksum:
          type: string
          description: SHA-256 十六进制摘要
        downloadUrl:
          type: string
          description: 文件下载地址，形如 `/api/files/{uuid}`
        createdAt:
          type: string
          format: date-time
