  /api/admin/reports:
    get:
      summary: 举报列表
      description: 仅管理员可查看，支持分页+状态+目标类型筛选
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
          description: 分页大小
        - name: status
