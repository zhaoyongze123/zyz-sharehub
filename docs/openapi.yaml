openapi: 3.0.3
info:
  title: ShareHub API
  version: 0.2.0
servers:
  - url: http://localhost:8080
paths:
  /api/auth/github/login:
    get:
      summary: 获取 GitHub 登录地址
      responses:
        '200':
          description: 成功
  /api/auth/github/callback:
    get:
      summary: GitHub OAuth 回调占位说明
      description: 实际 OAuth 回调由 Spring Security 处理，当前接口仅返回联调提示信息
      responses:
        '200':
          description: 成功；响应体为 JSON 提示信息
  /api/auth/me:
    get:
      summary: 获取当前用户
      description: 需要登录态，支持 OAuth 会话或本地联调头 X-User-Key
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me:
    get:
      summary: 个人中心聚合信息
      description: 需要登录后才会返回完整的用户统计，联调可通过 X-User-Key 透传用户标识；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/resources:
    get:
      summary: 获取我的发布资料列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: status
          in: query
          schema:
            type: string
        - name: visibility
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/roadmaps:
    get:
      summary: 获取我的路线列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/favorites:
    get:
      summary: 获取我的收藏资料列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/notes:
    get:
      summary: 获取我的笔记列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/resumes:
    get:
      summary: 获取我的简历工作台列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: status
          in: query
          schema:
            type: string
        - name: templateKey
          in: query
          schema:
            type: string
          description: 按模板筛选
        - name: keyword
          in: query
          schema:
            type: string
          description: 按模板名或文件名模糊筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            templateKey:
                              type: string
                            status:
                              type: string
                            fileUrl:
                              type: string
                            fileName:
                              type: string
                            fileSize:
                              type: integer
                            fileCreatedAt:
                              type: string
                              format: date-time
                            fileUpdatedAt:
                              type: string
                              format: date-time
                      total:
                        type: integer
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/avatar:
    post:
      summary: 上传用户头像
      description: 需要登录后提交，支持 OAuth 会话或本地联调头 X-User-Key；当前复用文件存储能力，`owner` 取当前登录用户，`category=AVATAR`，`referenceType=USER_AVATAR`，`referenceId` 为当前用户标识；真实实现校验文件非空、文件名存在且大小不超过 5MB；成功后返回文件元数据，其中 `contentType` 始终有值，上传缺省或非法时回落为 `application/octet-stream`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredFileUploadResponse'
        '400':
          description: 文件校验失败（错误码可能为 `FILE_NAME_REQUIRED`、`FILE_EMPTY`、`FILE_TOO_LARGE`、`FILE_READ_ERROR`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/files/upload:
    post:
      summary: 直传文件到文件存储
      description: 当前为底层文件存储接口，不走登录鉴权；调用方需自行传入 `owner`、`category`、`referenceType`、`referenceId`，真实实现仅校验文件非空、文件名存在、引用归属存在且大小不超过 5MB；成功后返回文件元数据，其中 `contentType` 始终有值，上传缺省或非法时回落为 `application/octet-stream`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - owner
                - category
                - referenceType
                - referenceId
                - file
              properties:
                owner:
                  type: string
                category:
                  type: string
                  enum:
                    - AVATAR
                    - RESOURCE_ATTACHMENT
                    - RESUME_PDF
                referenceType:
                  type: string
                referenceId:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredFileUploadResponse'
        '400':
          description: 文件校验失败（错误码可能为 `FILE_OWNER_REQUIRED`、`FILE_REFERENCE_REQUIRED`、`FILE_NAME_REQUIRED`、`FILE_EMPTY`、`FILE_TOO_LARGE`、`FILE_READ_ERROR`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/files/{id}:
    get:
      summary: 下载文件
      description: 当前为匿名可访问下载接口，按文件 `id` 直接返回二进制内容；`Content-Type` 优先使用入库时的 `contentType`，若为空或非法则回落到 `application/octet-stream`；`Content-Disposition` 固定为附件下载；文件不存在时返回空 body 的 `404`
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          headers:
            Content-Type:
              description: 入库时的 `contentType`；若为空或非法则回落到 `application/octet-stream`
              schema:
                type: string
            Content-Disposition:
              description: 固定为 `attachment; filename="{原始文件名}"`
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: 文件不存在
  /api/resources:
    get:
      summary: 资料分页列表
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 0
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 12
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: visibility
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
          description: 当前实现映射到资源 `type` 字段
        - in: query
          name: tag
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [latest, hot]
      responses:
        '200':
          description: 成功
    post:
      summary: 创建资料
      description: 需要当前用户身份，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/resources/featured:
    get:
      summary: 获取首页推荐资料
      responses:
        '200':
          description: 成功
  /api/resources/{id}:
    get:
      summary: 获取资料详情
      responses:
        '200':
          description: 成功
        '404':
          description: 资料不存在
        '410':
          description: 资料已下架
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: 更新资料
      description: 当前实现只允许 owner 更新自己的资料；联调可通过 `X-User-Key` 指定用户；用户被封禁返回 `403 USER_BANNED`，非 owner 返回 `403 RESOURCE_FORBIDDEN`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁或无权操作（错误码 `USER_BANNED`/`RESOURCE_FORBIDDEN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: 删除资料
      description: 当前实现只允许 owner 删除自己的资料；联调可通过 `X-User-Key` 指定用户；用户被封禁返回 `403 USER_BANNED`，非 owner 返回 `403 RESOURCE_FORBIDDEN`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁或无权操作（错误码 `USER_BANNED`/`RESOURCE_FORBIDDEN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资料不存在（错误码 `RESOURCE_NOT_FOUND`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/resources/{id}/publish:
    post:
      summary: 发布资料
      description: 当前实现只允许 owner 发布自己的资料；联调可通过 `X-User-Key` 指定用户；用户被封禁返回 `403 USER_BANNED`，非 owner 返回 `403 RESOURCE_FORBIDDEN`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁或无权操作（错误码 `USER_BANNED`/`RESOURCE_FORBIDDEN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/resources/{id}/related:
    get:
      summary: 获取相关推荐资料
      description: 当前按同分类或标签交集进行基础推荐，最多返回 4 条已发布资源
      responses:
        '200':
          description: 成功
        '404':
          description: 资料不存在（错误码 `RESOURCE_NOT_FOUND`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/resources/{id}/attachment:
    post:
      summary: 上传资料附件
      description: 当前实现只允许 owner 上传自己的资料附件；联调可通过 `X-User-Key` 指定用户；用户被封禁返回 `403 USER_BANNED`，非 owner 返回 `403 RESOURCE_FORBIDDEN`；成功后返回 `resourceId` 与文件元数据，其中 `file.contentType` 始终有值，上传缺省或非法时回落为 `application/octet-stream`
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceAttachmentUploadResponse'
        '400':
          description: 文件校验失败（错误码可能为 `FILE_NAME_REQUIRED`、`FILE_EMPTY`、`FILE_TOO_LARGE`、`FILE_READ_ERROR`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未登录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 用户被封禁或无权操作（错误码 `USER_BANNED`/`RESOURCE_FORBIDDEN`）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资料不存在
  /api/roadmaps:
    get:
      summary: 路线分页列表
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
    post:
      summary: 创建路线
      responses:
        '200':
          description: 成功
  /api/roadmaps/{id}:
    get:
      summary: 获取路线详情
      responses:
        '200':
          description: 成功
        '404':
          description: 路线不存在
  /api/roadmaps/{id}/nodes:
    post:
      summary: 给路线新增节点
      responses:
        '200':
          description: 成功
        '404':
          description: 路线不存在
  /api/roadmaps/{id}/progress:
    post:
      summary: 更新路线学习进度
      responses:
        '200':
          description: 成功
        '404':
          description: 路线不存在
  /api/notes:
    get:
      summary: 笔记分页列表
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
    post:
      summary: 创建笔记
      responses:
        '200':
          description: 成功
  /api/notes/{id}:
    get:
      summary: 获取笔记详情
      responses:
        '200':
          description: 成功
        '404':
          description: 笔记不存在（错误码 `NOTE_NOT_FOUND`）
    put:
      summary: 更新笔记
      responses:
        '200':
          description: 成功
        '404':
          description: 笔记不存在（错误码 `NOTE_NOT_FOUND`）
    delete:
      summary: 删除笔记
      responses:
        '200':
          description: 成功
        '404':
          description: 笔记不存在（错误码 `NOTE_NOT_FOUND`）
  /api/resumes/generate:
    post:
      summary: 生成简历 PDF
      description: 当前实现按请求用户生成简历，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
  /api/resumes:
    get:
      summary: 获取我的简历分页列表
      description: 当前实现按请求用户返回数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: status
          in: query
          schema:
            type: string
        - name: templateKey
          in: query
          schema:
            type: string
          description: 按模板筛选
        - name: keyword
          in: query
          schema:
            type: string
          description: 按模板名或文件名模糊筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 总记录数
                      page:
                        type: integer
                      pageSize:
                        type: integer
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            templateKey:
                              type: string
                            status:
                              type: string
                              description: 当前生成状态，如 GENERATED
                            fileUrl:
                              type: string
                              description: 实际返回下载链接 `/api/resumes/{id}/download`
                            fileName:
                              type: string
                            fileSize:
                              type: integer
                            fileCreatedAt:
                              type: string
                              format: date-time
                            fileUpdatedAt:
                              type: string
                              format: date-time
                  message:
                    type: string
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
  /api/resumes/{id}:
    get:
      summary: 获取简历生成记录
      description: 当前实现只返回当前用户拥有的简历，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
        '404':
          description: 简历不存在或非 owner（错误码 `RESUME_NOT_FOUND`）
    delete:
      summary: 删除简历记录
      description: 当前实现只允许当前用户删除自己的简历，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
        '404':
          description: 简历不存在或非 owner（错误码 `RESUME_NOT_FOUND`）
  /api/resumes/{id}/download:
    get:
      summary: 下载简历 PDF
      description: 当前实现只允许当前用户下载自己的简历，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
          headers:
            Content-Type:
              description: 优先使用文件记录中的 `contentType`；若为空、`NULL` 或非法则回落到 `application/octet-stream`
              schema:
                type: string
            Content-Disposition:
              description: 固定为 `attachment; filename="{原始文件名}"`
              schema:
                type: string
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
        '404':
          description: 简历不存在/非 owner 时返回错误码 `RESUME_NOT_FOUND`；若底层文件记录已丢失则返回空 body 的 `404`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                resumeNotFound:
                  summary: 简历不存在或非 owner
                  value:
                    success: false
                    code: RESUME_NOT_FOUND
                    message: RESUME_NOT_FOUND
  /api/resumes/workbench:
    get:
      summary: 获取我的简历工作台聚合信息
      description: 当前实现按请求用户聚合数据，联调可通过 `X-User-Key` 指定用户；未带身份时返回 `401 NOT_LOGGED_IN`，用户已被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                      generatedCount:
                        type: integer
                      templateBreakdown:
                        type: array
                        items:
                          type: object
                          properties:
                            templateKey:
                              type: string
                            count:
                              type: integer
                      recentItems:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            templateKey:
                              type: string
                            status:
                              type: string
                            fileUrl:
                              type: string
                  message:
                    type: string
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
  /api/resources/{id}/comments:
    get:
