    post:
      summary: 举报内容
      description: 需要当前用户身份；支持 `RESOURCE` 与 `NOTE` 两种目标，资源举报传 `resourceId`，笔记举报传 `targetType=NOTE` + `noteId`；`reason` 未传、为空字符串或仅空白时回落为 `无`；未带身份时返回 `401 NOT_LOGGED_IN`，用户被封禁时返回 `403 USER_BANNED`
      responses:
        '200':
          description: 成功
        '404':
          description: 目标不存在（错误码 `RESOURCE_NOT_FOUND` / `NOTE_NOT_FOUND`）
        '401':
          description: 未登录（错误码 `NOT_LOGGED_IN`）
        '403':
          description: 用户被封禁（错误码 `USER_BANNED`）
  /api/admin/reports:
    get:
      summary: 举报列表
      description: 仅管理员可查看，支持分页+状态+目标类型筛选
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
          description: 分页大小
        - name: status
          in: query
          schema:
            type: string
          description: 按举报状态筛选（OPEN / RESOLVED）
        - name: targetType
          in: query
          schema:
            type: string
          description: 按目标类型筛选（如 RESOURCE）
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/audit-logs:
    get:
      summary: 操作审计日志列表
      description: 管理员专用接口，按 actor/action/目标类型可筛选
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
          description: 分页大小
        - name: action
          in: query
          schema:
            type: string
          description: 单个操作类型（如 BLOCK_RESOURCE）
        - name: targetType
          in: query
          schema:
            type: string
          description: 目标类型筛选（如 RESOURCE / COMMENT）
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/reports/{id}/resolve:
    post:
      summary: 处理举报
      description: 管理员接口，修改举报状态为 RESOLVED
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 举报不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/resources/{id}/block:
    post:
      summary: 下架资料
      description: 管理员可标记资料为 blocked
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/resources/{id}/restore:
    post:
      summary: 恢复资料
      description: 管理员将资料从 blocked 状态恢复
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 资料不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/users:
    get:
      summary: 获取后台用户列表
      description: 管理员读取用户列表，返回真实昵称、登录标识与状态
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/users/{id}/ban:
    post:
      summary: 封禁用户
      description: 管理员接口，将用户状态标记为 BANNED，并写入一条 `BAN_USER` 审计日志
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/users/{id}/unban:
    post:
      summary: 解封用户
      description: 管理员将用户重新置为活跃，并写入一条 `UNBAN_USER` 审计日志
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/comments/{id}/hide:
    post:
      summary: 隐藏评论
      description: 管理员接口，隐藏评论后前端不再展示
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 评论不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/comments/{id}/restore:
    post:
      summary: 恢复评论
      description: 管理员恢复隐藏的评论
      responses:
        '200':
          description: 成功
        '403':
          description: 缺失或错误的 X-Admin-Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 评论不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          description: 业务错误码，便于前端区分类型
        message:
          type: string
          description: 出错提示
    UserProfileDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        name:
          type: string
          nullable: true
        avatarFileId:
          type: string
          format: uuid
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        status:
          type: string
    MeDto:
      type: object
      properties:
        profile:
          $ref: '#/components/schemas/UserProfileDto'
        myResourceCount:
          type: integer
          format: int64
        myFavoriteCount:
          type: integer
          format: int64
        myRoadmapCount:
          type: integer
          format: int64
        myNoteCount:
          type: integer
          format: int64
        myResumeCount:
          type: integer
          format: int64
        recentResourceCount:
          type: integer
          format: int64
        publishedResourceCount:
          type: integer
          format: int64
        draftNoteCount:
          type: integer
          format: int64
        generatedResumeCount:
          type: integer
          format: int64
    MeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/MeDto'
        message:
          type: string
    StoredFileUploadResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/StoredFileDto'
    ResumeGenerateRequest:
      type: object
      properties:
        templateKey:
          type: string
          description: 简历模板标识；未传、`null`、空字符串或仅空白时回落为 `default`
    ResumeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ResumeDto'
        message:
          type: string
    ResumePageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            total:
              type: integer
              description: 总记录数
            page:
              type: integer
            pageSize:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/ResumeDto'
        message:
          type: string
    ResumeWorkbenchResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/ResumeWorkbenchDto'
        message:
          type: string
    ResumeDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        templateKey:
          type: string
        status:
          type: string
          description: 当前生成状态，如 GENERATED
        fileId:
          type: string
          format: uuid
        fileUrl:
          type: string
          description: 实际返回下载链接 `/api/resumes/{id}/download`
        fileName:
          type: string
          nullable: true
          description: 关联文件记录存在时返回文件名；若底层文件记录已丢失则为 `null`
        fileSize:
          type: integer
          format: int64
          nullable: true
          description: 关联文件记录存在时返回文件大小；若底层文件记录已丢失则为 `null`
        fileCreatedAt:
          type: string
          format: date-time
          nullable: true
          description: 关联文件记录存在时返回文件创建时间；若底层文件记录已丢失则为 `null`
        fileUpdatedAt:
          type: string
          format: date-time
          nullable: true
          description: 关联文件记录存在时返回文件更新时间；若底层文件记录已丢失则为 `null`
    ResourceDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        type:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        tags:
          type: array
          nullable: true
          items:
            type: string
        externalUrl:
          type: string
          nullable: true
        objectKey:
          type: string
          nullable: true
        visibility:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        author:
          type: string
          nullable: true
        likes:
          type: integer
          format: int64
        favorites:
          type: integer
          format: int64
        downloadCount:
          type: integer
          format: int64
    ResourcePageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            total:
              type: integer
              format: int64
            page:
              type: integer
            pageSize:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/ResourceDto'
        message:
          type: string
    NoteDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        contentMd:
          type: string
        visibility:
          type: string
          nullable: true
          description: 可见性；传空字符串或仅空白时最终存为 null
        status:
          type: string
          nullable: true
          description: 笔记状态；创建时未传或空白会回落为 DRAFT
      required:
        - id
        - title
        - contentMd
    NoteUpsertRequest:
      type: object
      properties:
        title:
          type: string
        contentMd:
          type: string
        visibility:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
      required:
        - title
        - contentMd
    NoteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/NoteDto'
        message:
          type: string
    NotePageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            total:
              type: integer
              format: int64
            page:
              type: integer
            pageSize:
              type: integer
              items:
                type: array
                items:
                  $ref: '#/components/schemas/NoteDto'
        message:
          type: string
    RelatedNoteDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        summary:
          type: string
        updatedAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        tags:
          type: array
          items:
            type: string
        ownerKey:
          type: string
          nullable: true
        favorites:
          type: integer
          format: int64
        favorited:
          type: boolean
    RelatedNotePageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            total:
              type: integer
              format: int64
            page:
              type: integer
            pageSize:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/RelatedNoteDto'
        message:
          type: string
    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: string
          example: DELETED
        message:
          type: string
    ResumeWorkbenchDto:
      type: object
      properties:
        total:
          type: integer
          format: int64
        generatedCount:
          type: integer
          format: int64
        templateBreakdown:
          type: array
          description: 按模板聚合后的统计列表，按数量倒序返回
          items:
            $ref: '#/components/schemas/ResumeTemplateBreakdownDto'
        recentItems:
          type: array
          description: 最近生成的简历记录，按创建时间倒序返回，最多 5 条
          items:
            $ref: '#/components/schemas/ResumeDto'
    ResumeTemplateBreakdownDto:
      type: object
      properties:
        templateKey:
          type: string
        count:
          type: integer
          format: int64
    RoadmapWorkbenchDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        visibility:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
        nodeCount:
          type: integer
        completedNodeCount:
          type: integer
        progressPercent:
          type: integer
    RoadmapWorkbenchPageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            total:
              type: integer
              format: int64
            page:
              type: integer
            pageSize:
              type: integer
            items:
              type: array
              items:
                $ref: '#/components/schemas/RoadmapWorkbenchDto'
        message:
          type: string
    ResourceAttachmentUploadResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            resourceId:
              type: integer
              format: int64
            file:
              $ref: '#/components/schemas/StoredFileDto'
    StoredFileDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner:
          type: string
        category:
          type: string
          enum:
            - AVATAR
            - RESOURCE_ATTACHMENT
            - RESUME_PDF
        referenceType:
          type: string
        referenceId:
          type: string
        filename:
          type: string
        contentType:
          type: string
          description: 入库时的 `contentType`；若上传时缺省或非法则回落到 `application/octet-stream`
        size:
          type: integer
          format: int64
        checksum:
          type: string
          description: SHA-256 十六进制摘要
        downloadUrl:
          type: string
          description: 文件下载地址，形如 `/api/files/{uuid}`
        createdAt:
          type: string
          format: date-time
